# render.yaml
# ============================================================
# Render Blueprint — deploys BOTH services in one file.
# Commit this file to the ROOT of your repo, then connect
# the repo on render.com → "New Blueprint Instance".
# ============================================================

services:

  # ── 1. FastAPI Backend ──────────────────────────────────────
  - type: web
    name: multi-agent-rag-backend
    runtime: python
    rootDir: app                          # Render runs commands inside /app
    plan: free                            # free tier — upgrade for production
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        value: 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
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /                    # Render pings / to confirm app is up
    autoDeploy: true                      # redeploy automatically on git push

  # ── 2. React Frontend (Static Site) ─────────────────────────
  - type: web
    name: multi-agent-rag-frontend
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist             # Vite outputs to /dist
    envVars:
      - key: NODE_VERSION
        value: "18.0.0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html          # SPA fallback routing
    autoDeploy: true
